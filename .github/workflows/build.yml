name: Build Flutter APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean Workspace
        run: flutter clean

      - name: Install Dependencies
        run: flutter pub get

      - name: Force Overwrite AndroidManifest (Ultimate Fix)
        run: |
          cat << 'EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.example.tiktok_interactive">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.SYSTEM_ALERT_WINDOW" />
              <application android:label="tiktok_interactive" android:name="${applicationName}" android:icon="@mipmap/ic_launcher">
                  <activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
                  <service android:name=".AutoClickService" android:permission="android.permission.BIND_ACCESSIBILITY_SERVICE" android:exported="true">
                      <intent-filter>
                          <action android:name="android.accessibilityservice.AccessibilityService" />
                      </intent-filter>
                      <meta-data android:name="android.accessibilityservice" android:resource="@xml/accessibility_service_config" />
                  </service>
              </application>
          </manifest>
          EOF

      - name: Build APK Release
        run: flutter build apk --release -v
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-interactive-release
          path: build/app/outputs/flutter-apk/app-release.apk
